<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SciRes PTIT — Hệ thống Quản lý Nghiên cứu Khoa học dành cho sinh viên, giảng viên và cán bộ Học viện Công nghệ Bưu chính Viễn thông">
  <title>SciRes — Đăng nhập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="login-screen">
    <div class="login-shell">
      <div class="login-box ptit-style-box">
        <div class="login-brand-center">
          <img src="https://daotao.ptit.edu.vn/wp-content/uploads/sites/3/2024/08/Slide-16_9-1.png" alt="PTIT Logo" class="ptit-logo" width="500" height="150">
          <div class="login-title-text">Đăng nhập</div>
          <h2 class="login-app-name">HỆ THỐNG QUẢN LÝ NGHIÊN CỨU KHOA HỌC</h2>
        </div>
        
        <div id="login-msg"></div>
        <form id="login-form">
          <div class="form-group login-field">
            <label>Tài khoản</label>
            <input type="email" id="email" required class="input-plain">
          </div>
          <div class="form-group login-field">
            <label>Mật khẩu</label>
            <input type="password" id="password" required class="input-plain">
          </div>
          
          <div class="login-options">
            <label class="remember-me"><input type="checkbox"> Ghi nhớ</label>
            <a href="#" class="forgot-link">Quên mật khẩu?</a>
          </div>
          
          <button type="submit" class="btn btn-primary login-submit btn-red">Đăng nhập</button>
        </form>

        <div class="demo-accounts-toggle">
          <details>
            <summary>Tài khoản demo (Dành cho Dev/Test)</summary>
            <div class="demo-account-grid">
              <button type="button" class="demo-account" onclick="fillLogin('admin@university.edu.vn')"><span>Admin</span></button>
              <button type="button" class="demo-account" onclick="fillLogin('staff@university.edu.vn')"><span>Phòng KHCN</span></button>
              <button type="button" class="demo-account" onclick="fillLogin('leader@university.edu.vn')"><span>Lãnh đạo</span></button>
              <button type="button" class="demo-account" onclick="fillLogin('faculty1@university.edu.vn')"><span>GV 1</span></button>
              <button type="button" class="demo-account" onclick="fillLogin('reviewer1@university.edu.vn')"><span>PB 1</span></button>
            </div>
          </details>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (API.token()) location.href = '/app.html';

    function fillLogin(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = 'password123';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('login-msg');
      try {
        msg.innerHTML = '';
        const user = await API.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        location.href = '/app.html';
      } catch(err) {
        msg.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
