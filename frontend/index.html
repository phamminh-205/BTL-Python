<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống NCKH - Khoa An toàn Thông tin</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="center-content bg-light" style="background: radial-gradient(circle at top right, #e2e8f0 0%, #f8fafc 100%);">
    <div class="card landing-card shadow-lg">
        <div style="background: #eef2ff; width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
            <i class="ph ph-shield-check" style="font-size: 40px; color: var(--primary);"></i>
        </div>
        <h1>Khoa An Toàn Thông Tin</h1>
        <p>Giải pháp quản lý Nghiên cứu Khoa học tập trung dành cho Giảng viên và Sinh viên Học viện Công nghệ Bưu chính Viễn thông.</p>
        <button class="btn btn-primary" onclick="window.location.href='login.html'" style="padding: 14px 40px; font-size: 16px;">
            <i class="ph ph-sign-in" style="font-size: 20px;"></i>
            Truy cập hệ thống
        </button>
    </div>
</body>
</html>
