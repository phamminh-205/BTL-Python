<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống NCKH</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="center-content bg-light" style="background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);">
    <div class="card shadow-lg" style="width: 400px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="background: var(--primary); width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                <i class="ph ph-user-key" style="font-size: 28px; color: white;"></i>
            </div>
            <h2 style="margin: 0; font-size: 24px;">Chào mừng trở lại</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">Vui lòng đăng nhập vào tài khoản của bạn</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <div style="position: relative;">
                    <i class="ph ph-user" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="username" class="form-control" required placeholder="Tên đăng nhập" style="padding-left: 38px;">
                </div>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <div style="position: relative;">
                    <i class="ph ph-lock-key" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••" style="padding-left: 38px;">
                </div>
            </div>
            <p id="errorMsg" style="color: var(--danger); display: none; text-align: center; font-size: 13px; background: #fee2e2; padding: 8px; border-radius: 6px; margin-bottom: 20px;"></p>
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 46px;">
                Đăng nhập
                <i class="ph ph-arrow-right"></i>
            </button>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
